# YOLOv8 baseline config — noisy FICS-PCB REMAP variant (v3: held-out DEV monitoring)
# Training set: data/FICS_PCB_REMAP_NOISE_TRAIN/ (33 train boards, 75% annotations corrupted)
# Noise generated by: scripts/generate_noisy_dataset.py (seed=42) on data/train_clean
# Monitoring set: data/dev/ (clean, board-disjoint held-out DEV — used for best.pt selection)
# Final eval: data/val/ (= TEST, clean, read only by scripts/evaluate.py --val-images data/test/images)

model: yolov8m.pt
task: detect

data:
  train: data/FICS_PCB_REMAP_NOISE_TRAIN/images
  val: data/dev/images
  nc: 8
  names: ["resistor_smd", "ceramic_capacitor", "ic", "diode", "inductor", "electrolytic_capacitor", "tantalum_capacitor", "led"]

train:
  epochs: 50
  imgsz: 640
  batch: 16
  optimizer: AdamW
  lr0: 0.0005
  weight_decay: 0.0005
  patience: 15
  seed: 42

  project: runs/yolov8
  name: baseline_noisy_v3
  save_period: 10
  workers: 0
