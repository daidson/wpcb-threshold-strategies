# YOLOv8 self-training config — PCB-DSLR target domain, CLEAN teacher (control run), v3
# GEN0 teacher: runs/yolov8/baseline-2/weights/best.pt (clean FICS, mAP50=0.860)
# Purpose: isolate effect of teacher noise vs crop-scale geometry on class collapse.
#   Compare detection_growth.csv with yolov8_st_dslr_adaptive_v3_42 (noisy teacher).
#   All other hyperparameters identical — only warm_start changes.
# Labeled set: PCB-DSLR IC GT (data/PCB_DSLR_CROPS_512/orig_distribution/) passed via --labeled-images / --labeled-labels
# Calibration: data/dev/ (clean held-out DEV) — adaptive thresholds only
# Loop: Gen0 → Gen3 (3 student iterations)

model: yolov8m.pt
task: detect

data:
  train: data/combined/images   # placeholder — SelfTrainer builds this path dynamically per iteration
  val: data/dev/images
  nc: 8
  names: ["resistor_smd", "ceramic_capacitor", "ic", "diode", "inductor", "electrolytic_capacitor", "tantalum_capacitor", "led"]

train:
  epochs: 50
  imgsz: 640
  batch: 16
  optimizer: AdamW
  lr0: 0.0005
  weight_decay: 0.0005
  patience: 15
  seed: 42
  project: runs/yolov8
  name: self_train_dslr_clean
  workers: 0

pseudo_label:
  conf_threshold: 0.25
  nms_iou: 0.45
  max_det: 300
  adaptive_threshold: true
  candidate_floor: 0.05
  target_precision: 0.9   # adaptive: per-class lowest conf reaching this precision on DEV

self_training:
  iterations: 3
  warm_start: runs/yolov8/baseline-2/weights/best.pt
  unlabeled_dir: data/PCB_DSLR_CROPS_512/orig_distribution/images
  pseudo_only_mode: true
  partial_labels_dir: data/PCB_DSLR_CROPS_512/orig_distribution/labels
