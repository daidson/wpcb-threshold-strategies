# YOLO12m self-training config — PCB-DSLR target domain, PATH A (adaptive and static), v3
# Architecture: Area Attention (A2) — local self-attention (Tian et al., 2025)
#
# PATH A: retains the FICS support base in EVERY iteration (pseudo_only_mode: false),
# so the seven non-IC classes keep a labeled anchor and survive across generations
# (Honorato's "support base + pseudo-labels" structure). This is the only difference
# from configs/yolo12/self_train_dslr.yaml (which sets pseudo_only_mode: true and
# collapses to IC-only by iter1).
#
# Support base (NOISY, locked decision): data/FICS_PCB_REMAP_NOISE_TRAIN/ — 8-class,
# 75%-corrupted, consistent with the noisy-v3 teacher. Passed via --labeled-images /
# --labeled-labels in the launch script. A negative result is confounded (corrupt
# labels vs broken mechanism); fallback is data/train_clean as the support base.
#
# GEN0 teacher: runs/yolo12/baseline_noisy_v3/weights/best.pt
# PCB-DSLR IC GT (data/PCB_DSLR_CROPS_512/orig_distribution/labels) merged via partial_labels_dir.
# Calibration: data/dev/ (clean held-out DEV) — adaptive thresholds only; DSLR reports detection-growth, not FICS mAP.
# Loop: Gen0 -> Gen3 (3 student iterations).

model: yolo12m.pt
task: detect

data:
  train: data/combined/images   # placeholder — SelfTrainer builds this path dynamically per iteration
  val: data/dev/images
  nc: 8
  names: ["resistor_smd", "ceramic_capacitor", "ic", "diode", "inductor", "electrolytic_capacitor", "tantalum_capacitor", "led"]

train:
  epochs: 50
  imgsz: 640
  batch: 6
  optimizer: AdamW
  lr0: 0.0005
  weight_decay: 0.0005
  patience: 15
  seed: 42
  project: runs/yolo12
  name: self_train_dslr_pathA
  workers: 0

pseudo_label:
  conf_threshold: 0.25
  nms_iou: 0.45
  max_det: 300
  adaptive_threshold: true
  candidate_floor: 0.05
  target_precision: 0.9   # adaptive: per-class lowest conf reaching this precision on DEV (ignored under --no-adaptive)

self_training:
  iterations: 3
  warm_start: runs/yolo12/baseline_noisy_v3/weights/best.pt
  unlabeled_dir: data/PCB_DSLR_CROPS_512/orig_distribution/images
  pseudo_only_mode: false
  partial_labels_dir: data/PCB_DSLR_CROPS_512/orig_distribution/labels
