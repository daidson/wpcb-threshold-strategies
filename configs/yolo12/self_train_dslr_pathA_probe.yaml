# YOLO12m self-training config — PCB-DSLR target domain, PATH A PROBE (adaptive), v3
# Architecture: Area Attention (A2) — local self-attention (Tian et al., 2025)
#
# PROBE / generational-persistence test: identical to self_train_dslr_pathA.yaml except
# iterations: 2. Bumped 1->2 (2026-06-21) to test whether multi-class DSLR detections
# PERSIST across a generation (iter1 -> iter2), the real EFA-usability question — the
# iter1 detection-count drop is not an mAP failure (PCB-DSLR has no multi-class GT).
# Re-running the launch script RESUMES: SelfTrainer reuses the existing iter1 best.pt
# (does not retrain it), generates iter2 pseudo-labels from the iter1 student, trains
# iter2, then evaluate_pcb_dslr.py reports gen0 + iter1 + iter2.
#
# Support base (NOISY): data/FICS_PCB_REMAP_NOISE_TRAIN/ — via --labeled-images / --labeled-labels.
# GEN0 teacher: runs/yolo12/baseline_noisy_v3/weights/best.pt.

model: yolo12m.pt
task: detect

data:
  train: data/combined/images   # placeholder — SelfTrainer builds this path dynamically per iteration
  val: data/dev/images
  nc: 8
  names: ["resistor_smd", "ceramic_capacitor", "ic", "diode", "inductor", "electrolytic_capacitor", "tantalum_capacitor", "led"]

train:
  epochs: 50
  imgsz: 640
  batch: 6
  optimizer: AdamW
  lr0: 0.0005
  weight_decay: 0.0005
  patience: 15
  seed: 42
  project: runs/yolo12
  name: self_train_dslr_pathA_probe
  workers: 0

pseudo_label:
  conf_threshold: 0.25
  nms_iou: 0.45
  max_det: 300
  adaptive_threshold: true
  candidate_floor: 0.05
  target_precision: 0.9   # adaptive: per-class lowest conf reaching this precision on DEV

self_training:
  iterations: 2
  warm_start: runs/yolo12/baseline_noisy_v3/weights/best.pt
  unlabeled_dir: data/PCB_DSLR_CROPS_512/orig_distribution/images
  pseudo_only_mode: false
  partial_labels_dir: data/PCB_DSLR_CROPS_512/orig_distribution/labels
