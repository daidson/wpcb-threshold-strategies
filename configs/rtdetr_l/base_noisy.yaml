# RT-DETR-l baseline config — noisy FICS-PCB REMAP variant
# Training set: data/FICS_PCB_REMAP_NOISE/ (75% annotations corrupted — 25% class-swap + 25% removal + 25% box-distortion)
# Noise generated by: scripts/generate_noisy_dataset.py (seed=42)
# Val set: data/val/ (clean, never touched by noise)

model: rtdetr-l.pt
task: detect

data:
  train: data/FICS_PCB_REMAP_NOISE/images
  val: data/val/images
  nc: 8
  names: ["resistor_smd", "ceramic_capacitor", "ic", "diode", "inductor", "electrolytic_capacitor", "tantalum_capacitor", "led"]

train:
  epochs: 72
  imgsz: 640
  batch: 8
  optimizer: AdamW
  lr0: 0.0001
  weight_decay: 0.0001
  warmup_epochs: 2
  patience: 20
  seed: 42
  project: runs/rtdetr_l
  name: baseline_noisy
  workers: 0
