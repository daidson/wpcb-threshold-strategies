# RT-DETR-l self-training config — noisy FICS-PCB REMAP variant, progressive threshold
# GEN0 teacher: runs/rtdetr_l/baseline_noisy/weights/best.pt  (train with base_noisy.yaml first)
# Labeled set: data/FICS_PCB_REMAP_NOISE/ passed via --labeled-images / --labeled-labels in run script

model: rtdetr-l.pt
task: detect

data:
  train: data/combined/images   # placeholder — SelfTrainer builds this path dynamically per iteration
  val: data/val/images
  nc: 8
  names: ["resistor_smd", "ceramic_capacitor", "ic", "diode", "inductor", "electrolytic_capacitor", "tantalum_capacitor", "led"]

train:
  epochs: 36
  imgsz: 640
  batch: 6
  optimizer: AdamW
  lr0: 0.00005
  weight_decay: 0.0001
  warmup_epochs: 2
  patience: 15
  seed: 42
  project: runs/rtdetr_l
  name: self_train_noisy_progressive
  workers: 0

pseudo_label:
  conf_threshold: 0.25
  nms_iou: 0.45
  max_det: 300
  adaptive_threshold: false
  conf_schedule: [0.25, 0.35, 0.45, 0.55]

self_training:
  iterations: 4
  warm_start: runs/rtdetr_l/baseline_noisy/weights/best.pt
  unlabeled_dir: data/FICS_PCB_REMAP_NOISE/images
  pseudo_only_mode: true
  partial_labels_dir: null
