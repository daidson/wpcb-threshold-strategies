# YOLOv10 self-training config — labeled + pseudo-labeled data

model: yolov10m.pt
task: detect

data:
  train: data/combined/images   # placeholder — SelfTrainer builds this path dynamically per iteration
  val: data/val/images
  nc: 8
  names: ["resistor_smd", "ceramic_capacitor", "ic", "diode", "inductor", "electrolytic_capacitor", "tantalum_capacitor", "led"]

train:
  epochs: 50
  imgsz: 640
  batch: 12
  optimizer: AdamW
  lr0: 0.0005
  weight_decay: 0.0005
  patience: 15
  seed: 42
  project: runs/yolov10
  name: self_train
  workers: 0

pseudo_label:
  conf_threshold: 0.25
  nms_iou: 0.45
  max_det: 300
  adaptive_threshold: true
  candidate_floor: 0.05

self_training:
  iterations: 3
  warm_start: runs/yolov10/baseline/weights/best.pt
  partial_labels_dir: data/PCB_DSLR_CROPS_512/orig_distribution/labels
